<!-- app.component.html -->

<div class="app-container">
  <!-- Video stream -->
  <video #video autoplay playsinline></video>
</div>
<app-camera (pictureTaken)="handleImage($event)"></app-camera>


<div class="snapshot" *ngIf="webcamImage">
	<img [src]="webcamImage.imageAsDataUrl" />
</div>
  <!-- Canvas for snapshot -->
  <canvas #canvas hidden></canvas>
<p>AUTHORIZED?: {{ isUserAuthenticated | json }}</p>

  <!-- Action buttons -->
  <div class="action-buttons">
    <button (click)="startRecording()">Start Recording</button>
<button (click)="stopRecording()" [disabled]="!isUserAuthenticated">Stop Recording</button>
    <button (click)="triggerSnapshot()">Take Snapshot</button>
  </div>
  <img [src]="snapshotDataURL" alt="Snapshot" *ngIf="snapshotDataURL" class="snapshot-image">

  <!-- Captured videos gallery -->
  <div class="video-gallery">
    <div *ngFor="let capture of captures" class="video-item">
      <video [src]="capture" controls></video>
    </div>
  </div>
</div>
